<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Лекар | Медицинско досие</title>
    <link rel="stylesheet" href="/style/doctor/doctor.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
    <script src="/scripts/doctor/doctor.js" type="module"></script>
    <script src="/scripts/auth/header_data.js" type="module"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav style="background:#166534;color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center">
    <h1 style="font-size:16px;font-weight:500">Медицинско досие — Лекар</h1>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="user-name" style="font-size:13px;opacity:0.85"></span>
        <button disabled = "true" onclick="window.location.href = '/user_tabs/admin/admin.html' ;" id="admin-panel-btn" class= "nav-btn" hidden>
            Админ панел
        </button>
        <button onclick="window.location.href = 'data.html'; " class= "data-btn">
            Данни
        </button>
        <button onclick="logout()" class="logout-btn">
            Изход
        </button>
    </div>
</nav>

<div class="container mx-auto py-5 px-4">
    <div class="flex gap-2 mb-4">
        <button onclick="showTab('examinations')" id="tab-examinations" class="tab-btn active-tab">
            <i class="fas fa-stethoscope me-1"></i> Моите прегледи
        </button>
        <button onclick="showTab('patients')" id="tab-patients" class="tab-btn">
            <i class="fas fa-users me-1"></i> Пациенти
        </button>
        <button onclick="showTab('sickleaves')" id="tab-sickleaves" class="tab-btn">
            <i class="fas fa-file-medical me-1"></i> Болнични
        </button>
    </div>

    <!-- Прегледи -->
    <div id="section-examinations" class="section">
        <div class="bg-white rounded-lg shadow-sm p-4 border border-gray-100">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h2 class="text-sm font-medium text-gray-700">Моите прегледи</h2>
                <button onclick="openExaminationModal()"
                    style="background:#166534;color:white;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer">
                    + Нов преглед
                </button>
            </div>
            <div id="examinations-table"></div>
        </div>
    </div>

   <!-- Пациенти -->
<div id="section-patients" class="section hidden">
    <div class="bg-white rounded-lg shadow-sm p-4 border border-gray-100">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 class="text-sm font-medium text-gray-700">Пациенти</h2>
            <input type="text" id="patient-search" placeholder="Търси по име или ЕГН..."
                oninput="filterPatients(this.value)"
                style="border:0.5px solid #d1d5db;border-radius:6px;padding:7px 12px;font-size:13px;width:260px"/>
        </div>
        <div id="patients-table"></div>
    </div>
</div>
    <!-- Болнични -->
    <div id="section-sickleaves" class="section hidden">
        <div class="bg-white rounded-lg shadow-sm p-4 border border-gray-100">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <h2 class="text-sm font-medium text-gray-700">Болнични листове</h2>
                <button onclick="openSickLeaveModal()"
                    style="background:#166534;color:white;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer">
                    + Нов болничен
                </button>
            </div>
            <div id="sickleaves-table"></div>
        </div>
    </div>
</div>

<!-- Modal - История на пациент -->
<div id="history-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:center;justify-content:center">
    <div style="background:white;border-radius:10px;padding:24px;width:100%;max-width:700px;margin:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h3 style="font-size:15px;font-weight:500">
                История на: <span id="history-patient-name" style="color:#166534"></span>
            </h3>
            <button onclick="closeModal('history-modal')"
                style="background:transparent;border:none;font-size:18px;cursor:pointer;color:#6b7280">✕</button>
        </div>
        <div id="history-table"></div>
    </div>
</div>

<!-- Modal - Нов преглед -->
<div id="examination-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:center;justify-content:center">
    <div style="background:white;border-radius:10px;padding:24px;width:100%;max-width:440px;margin:auto">
        <h3 style="font-size:15px;font-weight:500;margin-bottom:16px">Нов преглед</h3>
        <div style="display:flex;flex-direction:column;gap:10px">
            <div>
                <label style="font-size:12px;color:#6b7280">Пациент</label>
                <select id="exam-patient"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"></select>
            </div>
            <div>
                <label style="font-size:12px;color:#6b7280">Дата</label>
                <input type="date" id="exam-date"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"/>
            </div>
            <div>
                <label style="font-size:12px;color:#6b7280">Диагноза</label>
                <input type="text" id="exam-diagnosis" placeholder="Въведи диагноза"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"/>
            </div>
            <div>
                <label style="font-size:12px;color:#6b7280">Лечение</label>
                <input type="text" id="exam-treatment" placeholder="Въведи лечение"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"/>
            </div>
            <div id="price_examination">
    <label style="font-size:12px;color:#6b7280">Цена (лв.)</label>
    <input type="number" id="exam-price" placeholder="0.00" min="0"
        style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"/>
</div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px">
            <button onclick="closeModal('examination-modal')"
                style="padding:7px 16px;border:0.5px solid #d1d5db;border-radius:6px;font-size:13px;cursor:pointer;background:white">
                Отказ
            </button>
            <button onclick="saveExamination()"
                style="padding:7px 16px;background:#166534;color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer">
                Запази
            </button>
        </div>
    </div>
</div>

<!-- Modal - Нов болничен -->
<div id="sickleave-modal"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:50;align-items:center;justify-content:center">
    <div style="background:white;border-radius:10px;padding:24px;width:100%;max-width:440px;margin:auto">
        <h3 style="font-size:15px;font-weight:500;margin-bottom:16px">Нов болничен лист</h3>
        <div style="display:flex;flex-direction:column;gap:10px">
            <div>
                <label style="font-size:12px;color:#6b7280">Преглед</label>
                <select id="sl-examination"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"></select>
            </div>
            <div>
                <label style="font-size:12px;color:#6b7280">Начална дата</label>
                <input type="date" id="sl-startdate"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"/>
            </div>
            <div>
                <label style="font-size:12px;color:#6b7280">Брой дни</label>
                <input type="number" id="sl-days" placeholder="1" min="1" max="365"
                    style="width:100%;border:0.5px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:4px"/>
            </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px">
            <button onclick="closeModal('sickleave-modal')"
                style="padding:7px 16px;border:0.5px solid #d1d5db;border-radius:6px;font-size:13px;cursor:pointer;background:white">
                Отказ
            </button>
            <button onclick="saveSickLeave()"
                style="padding:7px 16px;background:#166534;color:white;border:none;border-radius:6px;font-size:13px;cursor:pointer">
                Запази
            </button>
        </div>
    </div>
</div>
</body>
</html>
