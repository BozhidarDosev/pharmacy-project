<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Лекар | Медицинско досие</title>
    <link rel="stylesheet" href="/style/doctor/data.css">
    <link rel="stylesheet" href="/style/doctor/doctor.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/scripts/doctor/data.js" type="module"></script>
    <script src="/scripts/auth/header_data.js" type="module"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav style="background:#166534;color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center">
    <h1 style="font-size:16px;font-weight:500">Медицинско досие — Лекар</h1>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="user-name" style="font-size:13px;opacity:0.85"></span>
        <button disabled="true" onclick="window.location.href='/user_tabs/admin/admin.html';"
            id="admin-panel-btn" class="nav-btn" hidden>Админ панел</button>
        <button onclick="window.location.href='doctor.html';" class="data-btn">Начало</button>
        <button onclick="logout()" class="logout-btn">Изход</button>
    </div>
</nav>

<div class="card-container">
    <div class="card">
        <h2>Моите данни</h2>
        <div class="error" id="error-msg"></div>
        <div class="success" id="success-msg"></div>

        <!-- Само за четене -->
        <div class="form-group">
            <label>Идентификационен номер</label>
            <span class="readonly-value" id="license-number"></span>
        </div>

        <div class="form-group">
            <label>Име и фамилия</label>
            <span class="readonly-value" id="name"></span>
        </div>

        <!-- Редактируеми -->
        <div class="form-group">
            <label>Специализации</label>
            <div id="specializations-container"></div>
            <button type="button" onclick="addSpec()" class="add-spec-btn">
                + Добави специализация
            </button>
        </div>

        <div class="form-group" id="gp-group">
            <label>Личен лекар</label>
            <select id="generalPractitioner">
                <option value="true">Да</option>
                <option value="false">Не</option>
            </select>
            <small id="gp-warning" style="color:#e24b4a;display:none">
                Не може да смените статуса - имате вързани пациенти
            </small>
        </div>

        <button class="submit-btn" onclick="saveChanges()">
            Запази промените
        </button>
    </div>
</div>

</body>
</html>
