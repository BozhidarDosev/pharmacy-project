<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Пациент | Медицинско досие</title>
    <link rel="stylesheet" href="/style/patient/patient.css">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
    <script src="/scripts/patient/patient.js" type="module"></script>
    <script src="/scripts/auth/header_data.js" type="module"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<nav style="background:#6b21a8;color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center">
    
    <h1 style="font-size:16px;font-weight:500">Медицинско досие | Пациент</h1>
    
    <div style="display:flex;align-items:center;gap:8px">
        <span id="user-name" style="font-size:13px;opacity:0.85"></span>   
        <button disabled = "true" onclick="window.location.href = '/user_tabs/admin/admin.html' ;" id="admin-panel-btn" class= "data-btn" hidden>
            Админ панел
        </button>
        <button onclick="window.location.href = 'data.html'; " class= "data-btn">
            Данни
        </button>
        <button onclick="logout()" class="logout-btn">
            Изход
        </button>
    </div>
</nav>

<div class="container mx-auto py-5 px-4">
    <div class="flex gap-2 mb-4">
        <button onclick="showTab('examinations')" id="tab-examinations" class="tab-btn active-tab">
            <i class="fas fa-stethoscope me-1"></i> Моите прегледи
        </button>
        <button onclick="showTab('sickleaves')" id="tab-sickleaves" class="tab-btn">
            <i class="fas fa-file-medical me-1"></i> Болнични
        </button>
    </div>

    <div id="section-examinations" class="section">
        <div class="bg-white rounded-lg shadow-sm p-4 border border-gray-100">
            <h2 class="text-sm font-medium text-gray-700 mb-4">Моята медицинска история</h2>
            <div id="examinations-table"></div>
        </div>
    </div>

    <div id="section-sickleaves" class="section hidden">
        <div class="bg-white rounded-lg shadow-sm p-4 border border-gray-100">
            <h2 class="text-sm font-medium text-gray-700 mb-4">Моите болнични</h2>
            <div id="sickleaves-table"></div>
        </div>
    </div>
</div>


</body>
</html>
