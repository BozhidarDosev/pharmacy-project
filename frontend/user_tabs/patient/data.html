<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Пациент | Медицинско досие</title>
    <link rel="stylesheet" href="/style/patient/patient.css">
    <link rel="stylesheet" href="/style/patient/data.css">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
    <script src="/scripts/patient/data.js" type="module"></script>
    <script src="/scripts/auth/header_data.js" type="module"></script>
    
</head>
<body class="bg-gray-100 min-h-screen">

<nav style="background:#6b21a8;color:white;padding:12px 24px;display:flex;justify-content:space-between;align-items:center">
    <h1 style="font-size:16px;font-weight:500">Медицинско досие | Пациент</h1>
    <div style="display:flex;align-items:center;gap:8px">
        <span id="user-name" style="font-size:13px;opacity:0.85"></span>
        <button disabled = "true" onclick="window.location.href = '/user_tabs/admin/admin.html' ;" id="admin-panel-btn" class= "data-btn" hidden>
            Админ панел
        </button>
        <button onclick="window.location.href = 'patient.html'; " class= "data-btn">
            Начало
        </button>
        <button onclick="logout()" class="logout-btn">
            Изход
        </button>
    </div>
</nav>

<container class="card-container">
<div class="card">
    <h2 style ="font-size:25px;">Данни</h2>
       <div class="error" id="error-msg"></div>
        <div class="success" id="success-msg"></div>
    <p style="font-size:17px;color:#002266;margin-bottom:16px">
        Вашите лични данни 
    </p>

    <!-- Само за четене -->
    <div class ="form-group">
        <label>Име и фамилия</label>
        <span class="readonly-value" id="name" id="name"></span>
    </div> 
    
    <div class="form-group">
        <label>ЕГН</label>
        <span class="readonly-value" id="egn"></span>
    </div>

    <!-- Редактируеми -->
    <div class="form-group" id="gp-group">
        <label>Осигурявате ли се (за последните 6 месеца)</label>
        <select id="insured">
                <option value="true">Да</option>
                <option value="false">Не</option>
        </select>
            <small id="gp-warning" style="color:#e24b4a;display:none">
                ⚠️ Не може да смените статуса — имате неплатени прегледи
            </small>
    </div>

    <div class="form-group">
        <label>Личен лекар</label>
        <span type="personal-doctor" id="personal-doctor"></select>
    </div>
    
    <button class="submit-btn" onclick="saveChanges()">
            Запази промените
    </button>
</div>
</container>


</body>
</html>
