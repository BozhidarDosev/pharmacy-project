version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: pharmacy_postgres
    environment:
      POSTGRES_DB: pharmacy_db
      POSTGRES_USER: pharmacy_user
      POSTGRES_PASSWORD: pharmacy_pass
    ports:
      - "5432:5432"
    volumes:
      - pharmacy_data:/var/lib/postgresql/data

volumes:
  pharmacy_data: